moe:
  module_id: "moe_council_of_experts_v1"
  module_name: "UNICC Council of Experts MoE"
  version: "1.0.0"
  timeout_seconds: 60

routing:
  mode: "all"   # "all" or "top_k"
  top_k: 3

aggregation:
  reject_threshold: 1.35
  flag_threshold: 0.55

experts:
  - name: "pillar1_platform_safety"
    module_id: "expert_module_1_pillar1"
    evaluate_endpoint: "http://localhost:8000/evaluate"
    health_endpoint: "http://localhost:8000/health"
    weight: 1.0
    timeout_seconds: 60
    keywords:
      - "platform"
      - "governance"
      - "deployment"
      - "bias"
      - "risk"
      - "safety"
      - "trustworthiness"

  - name: "pillar2_adversarial"
    module_id: "pillar_2_expert_t6"
    evaluate_endpoint: "http://localhost:8002/evaluate"
    health_endpoint: "http://localhost:8002/health"
    weight: 1.15
    timeout_seconds: 60
    keywords:
      - "adversarial"
      - "jailbreak"
      - "prompt injection"
      - "exploit"
      - "attack"
      - "unsafe"
      - "red team"

  - name: "pillar3_policy_compliance"
    module_id: "pillar_3_policy_compliance"
    evaluate_endpoint: "http://localhost:8003/evaluate"
    health_endpoint: "http://localhost:8003/health"
    weight: 1.0
    timeout_seconds: 60
    keywords:
      - "policy"
      - "privacy"
      - "ethics"
      - "compliance"
      - "security"
      - "data"
      - "governance"

logging:
  audit_log_file: "moe_audit_log.jsonl"
