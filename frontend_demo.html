<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNICC AI Safety Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 28px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    p.subtitle {
      color: #666;
      margin-top: 0;
      margin-bottom: 24px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      padding: 14px;
      border: 1px solid #d0d7de;
      border-radius: 10px;
      font-size: 15px;
      resize: vertical;
      box-sizing: border-box;
    }

    button {
      margin-top: 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .panel {
      margin-top: 28px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      background: #fafafa;
    }

    .row {
      margin-bottom: 12px;
    }

    .label {
      font-weight: bold;
      display: inline-block;
      min-width: 140px;
    }

    .verdict {
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .accept {
      background: #dcfce7;
      color: #166534;
    }

    .flag {
      background: #fef3c7;
      color: #92400e;
    }

    .reject {
      background: #fee2e2;
      color: #991b1b;
    }

    .loading {
      color: #555;
      font-style: italic;
      margin-top: 16px;
    }

    .error {
      color: #b91c1c;
      font-weight: bold;
    }

    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      background: white;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #eee;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>UNICC AI Safety Evaluation Demo</h1>
    <p class="subtitle">
      Enter a prompt and review the system verdict, harm level, confidence, and reasoning trace.
    </p>

    <textarea id="promptInput" placeholder="Enter a prompt to evaluate..."></textarea>
    <br />
    <button onclick="submitPrompt()">Evaluate Prompt</button>

    <div id="status" class="loading"></div>

    <div class="panel" id="resultPanel" style="display:none;">
      <div class="row">
        <span class="label">Prompt:</span>
        <span id="promptText"></span>
      </div>

      <div class="row">
        <span class="label">Verdict:</span>
        <span id="verdictText" class="verdict"></span>
      </div>

      <div class="row">
        <span class="label">Harm Level:</span>
        <span id="harmText"></span>
      </div>

      <div class="row">
        <span class="label">Confidence:</span>
        <span id="confidenceText"></span>
      </div>

      <div class="row">
        <span class="label">Reasoning:</span>
        <pre id="reasoningText"></pre>
      </div>
    </div>
  </div>

  <script>
    async function submitPrompt() {
      const input = document.getElementById("promptInput").value.trim();
      const status = document.getElementById("status");
      const panel = document.getElementById("resultPanel");

      if (!input) {
        status.innerHTML = '<span class="error">Please enter a prompt first.</span>';
        panel.style.display = "none";
        return;
      }

      status.textContent = "Evaluating...";
      panel.style.display = "none";

      try {
        const response = await fetch("http://127.0.0.1:8000/evaluate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            prompt: input
          })
        });

        if (!response.ok) {
          throw new Error("API request failed with status " + response.status);
        }

        const data = await response.json();

        document.getElementById("promptText").textContent = input;
        document.getElementById("harmText").textContent = data.harm_level ?? "N/A";
        document.getElementById("confidenceText").textContent = data.confidence_score ?? "N/A";
        document.getElementById("reasoningText").textContent = data.reasoning_trace ?? "No reasoning returned.";

        const verdictEl = document.getElementById("verdictText");
        const verdict = (data.verdict || "UNKNOWN").toUpperCase();
        verdictEl.textContent = verdict;
        verdictEl.className = "verdict";

        if (verdict === "ACCEPT" || verdict === "APPROVE") {
          verdictEl.classList.add("accept");
        } else if (verdict === "FLAG" || verdict === "REVIEW") {
          verdictEl.classList.add("flag");
        } else {
          verdictEl.classList.add("reject");
        }

        panel.style.display = "block";
        status.textContent = "";
      } catch (error) {
        status.innerHTML = '<span class="error">Error: could not connect to backend.</span>';
        panel.style.display = "none";
        console.error(error);
      }
    }
  </script>
</body>
</html>
